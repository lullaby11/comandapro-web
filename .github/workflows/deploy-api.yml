name: Deploy API → ECR + App Runner

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/api/prisma/**"
      - ".github/workflows/deploy-api.yml"

env:
  AWS_REGION: eu-west-1

jobs:
  deploy:
    name: Build → Push ECR → Deploy App Runner
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --cache-from $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f apps/api/Dockerfile .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Trigger App Runner deployment
        env:
          SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
          echo "Deployment triggered for $SERVICE_ARN"

      - name: Wait for deployment to complete
        env:
          SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          echo "Waiting for App Runner to reach RUNNING state..."
          for i in $(seq 1 30); do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$SERVICE_ARN" \
              --query "Service.Status" --output text)
            echo "  Status: $STATUS"
            if [ "$STATUS" = "RUNNING" ]; then
              echo "Deployment successful!"
              exit 0
            fi
            if [ "$STATUS" = "CREATE_FAILED" ] || [ "$STATUS" = "DELETE_FAILED" ]; then
              echo "Deployment FAILED with status: $STATUS"
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for deployment"
          exit 1
