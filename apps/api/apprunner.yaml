version: 1
runtime: NODEJS_20

build:
  commands:
    build:
      - npm ci
      - npx prisma generate
      - npm run build

run:
  command: sh -c "npx prisma migrate deploy && node dist/index.js"
  network:
    port: 4000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: ALLOWED_ORIGINS
      value: "https://main.d33spjlfz445rx.amplifyapp.com"
  secrets:
    - name: DATABASE_URL
    - name: JWT_SECRET
    - name: APP_URL
